<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KRAA — Karan Rental &amp; Accounts Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOGIN GATE -->
<div class="login-screen" id="loginScreen">
  <form class="login-card" id="loginForm">
    <div class="login-tag">KRAA</div>
    <h2>Sign in</h2>
    <p class="login-sub">Enter the password to access Projector Solutions data.</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" autocomplete="current-password" required autofocus>
    </div>
    <button type="submit" class="btn" id="loginBtn">Unlock</button>
    <div class="login-error" id="loginError"></div>
  </form>
</div>

<div class="app" id="appRoot" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-tag">KRAA</div>
      <div class="brand-sub">Projector Solutions</div>
    </div>

    <nav class="nav">
      <div class="nav-group-label">Business</div>
      <button class="nav-item active" data-view="dashboard"><span class="nav-ico">◧</span>Dashboard</button>
      <button class="nav-item" data-view="customer"><span class="nav-ico">◔</span>Customers</button>
      <button class="nav-item" data-view="vendor"><span class="nav-ico">◔</span>Vendors</button>
      <button class="nav-item" data-view="booking"><span class="nav-ico">◨</span>Bookings</button>
      <button class="nav-item" data-view="inventory"><span class="nav-ico">◫</span>Equipment</button>
      <button class="nav-item" data-view="expense"><span class="nav-ico">◒</span>Expenses</button>
      <button class="nav-item" data-view="invoice"><span class="nav-ico">◪</span>Quotation &amp; Invoice</button>
      <button class="nav-item" data-view="payments"><span class="nav-ico">◓</span>Payments</button>
      <button class="nav-item" data-view="staff"><span class="nav-ico">◕</span>Staff</button>
      <button class="nav-item" data-view="reports"><span class="nav-ico">◑</span>Reports</button>

      <div class="nav-group-label">Finance &amp; Wealth</div>
      <button class="nav-item" data-view="bank"><span class="nav-ico">◧</span>Bank Accounts</button>
      <button class="nav-item" data-view="fdrd"><span class="nav-ico">◨</span>FD / RD</button>
      <button class="nav-item" data-view="creditcards"><span class="nav-ico">◪</span>Credit Cards</button>
      <button class="nav-item" data-view="giftcards"><span class="nav-ico">◓</span>Gift Cards &amp; Wallets</button>
      <button class="nav-item" data-view="investments"><span class="nav-ico">◫</span>Investments</button>
      <button class="nav-item" data-view="assets"><span class="nav-ico">◒</span>Assets &amp; Liabilities</button>
      <button class="nav-item" data-view="personal"><span class="nav-ico">◪</span>Personal Expenses</button>
      <button class="nav-item" data-view="networth"><span class="nav-ico">◓</span>Net Worth</button>

      <div class="nav-group-label">System</div>
      <button class="nav-item" data-view="settings"><span class="nav-ico">◔</span>Settings</button>
    </nav>

    <div class="sync-box">
      <div class="sync-dot" id="syncDot"></div>
      <div>
        <div class="sync-title" id="syncTitle">Local storage mode</div>
        <div class="sync-sub" id="syncSub">Sheets not connected</div>
      </div>
    </div>
  </aside>

  <!-- BACKDROP for mobile -->
  <div class="backdrop" id="backdrop"></div>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
      <h1 class="view-title" id="viewTitle">Dashboard</h1>
      <div class="topbar-right">
        <span class="date-chip" id="todayChip"></span>
        <button class="btn secondary" id="logoutBtn" style="padding:6px 12px; font-size:12px;">Log out</button>
      </div>
    </header>

    <div class="view-scroll" id="viewRoot">
      <!-- Views are injected here by app.js -->
    </div>
  </main>
</div>

<!-- Generic modal for add/edit forms -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Add record</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <form id="modalForm" class="modal-body"></form>
  </div>
</div>

<script src="js/store.js"></script>
<script src="js/auth.js"></script>
<script src="js/sheets-api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
